<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    font-family: 'Cutive', serif;
    color: #111;
  }

  header {
    text-align: center;
    padding: 60px 20px 62px;
  }

  header p {
    font-size: 16px;
    line-height: 1.6;
    color: #111;
  }

  .grid {
    max-width: 1440px;
    margin: 0 auto;
    padding: 20px 80px 120px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    row-gap: 82px;
    column-gap: 0px;
    justify-items: center;
    align-items: end;
  }

  .lighter {
    position: relative;
    width: 62px;
    cursor: default;
  }

  .lighter img {
    width: 100%;
    height: auto;
    display: block;
  }

  .lighter img.back-overlay {
    position: fixed;
    width: 434px;
    height: auto;
    display: none;
    z-index: 7000;
    pointer-events: none;
    transform: translate(-50%, -100%);
  }

  footer {
    text-align: center;
    padding: 80px 20px 80px;
  }

  footer p {
    font-size: 16px;
    line-height: 1.6;
    color: #111;
    margin-bottom: 20px;
  }

  #player {
    display: inline-flex;
    align-items: center;
    gap: 0;
    border: 1px solid #D9D9D9;
    padding: 9px 14px;
    width: 381px;
    box-sizing: border-box;
  }

  #play-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    width: 17px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 14px;
  }

  #waveform-wrap {
    flex: 1;
    cursor: pointer;
    height: 26px;
    display: flex;
    align-items: flex-end;
  }

  /* tooltip */
  #hover-label {
    position: fixed;
    pointer-events: none;
    z-index: 8000;
    display: none;
    box-sizing: border-box;
    height: 25px;
    padding: 0 8px;
    background: #fff;
    border: 1px solid #000;
    font-family: 'Cutive', serif;
    font-size: 11px;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    transform: translate(12px, -50%);
  }

  /* counter badge */
  .lighter-count {
    position: absolute;
    width: 32px;
    height: 25px;
    left: 110px;
    top: 176px;
    border-radius: 4000px;
    pointer-events: none;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .lighter-count span {
    position: absolute;
    width: 17px;
    height: 25px;
    left: 8px;
    top: 0px;
    font-family: 'Cutive Mono';
    font-style: normal;
    font-weight: 400;
    font-size: 16px;
    line-height: 180%;
    text-align: center;
    color: #000000;
    -webkit-text-stroke: 0.2px #000000;
    text-stroke: 0.2px #000000;
  }

  @media (max-width: 900px) {
    .grid {
      grid-template-columns: repeat(3, 1fr);
      padding: 20px 30px 80px;
      row-gap: 50px;
    }
    .lighter { width: 80px !important; }
  }
</style>

<script>
// ── MUSIC ──────────────────────────────────────────────
var audio = document.getElementById('audio');

function setPlayIcon(playing) {
  document.getElementById('icon-play').style.display  = playing ? 'none' : '';
  document.getElementById('icon-pause').style.display = playing ? ''     : 'none';
}

// autoplay on first user interaction
var autoStarted = false;
function tryAutoStart() {
  if (autoStarted) return;
  autoStarted = true;
  audio.play().then(function() {
    setPlayIcon(true);
  }).catch(function() {
    autoStarted = false; // retry on next interaction
  });
}
['click','scroll','keydown','touchstart'].forEach(function(ev) {
  document.addEventListener(ev, tryAutoStart);
});

var clipP  = document.getElementById('clip-p-rect');
var clipU  = document.getElementById('clip-u-rect');
var totalW = 310.00;

audio.addEventListener('timeupdate', function() {
  var pct = audio.currentTime / (audio.duration || 1);
  var w = pct * totalW;
  clipP.setAttribute('width', w);
  clipU.setAttribute('x', w);
  clipU.setAttribute('width', totalW - w);
});
audio.addEventListener('ended', function() {
  setPlayIcon(false);
});
audio.addEventListener('play',  function() { setPlayIcon(true);  });
audio.addEventListener('pause', function() { setPlayIcon(false); });

function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}
function seek(e) {
  var rect = document.getElementById('waveform-wrap').getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * (audio.duration || 0);
}

// ── INDIVIDUAL WIDTH OVERRIDES ─────────────────────────
var indWidths = {8:48, 4:52, 32:52, 22:56, 20:46, 33:54, 39:42, 41:52, 42:48, 45:52};

// ── BUILD GRID ─────────────────────────────────────────
var grid = document.getElementById('grid');

// Shuffle
var shuffled = lighters.slice();
for (var s = shuffled.length - 1; s > 0; s--) {
  var r = Math.floor(Math.random() * (s + 1));
  var tmp = shuffled[s]; shuffled[s] = shuffled[r]; shuffled[r] = tmp;
}

shuffled.forEach(function(l, i) {
  var div = document.createElement('div');
  div.className = 'lighter';
  div.dataset.idx = i;
  if (indWidths[i]) div.style.width = indWidths[i] + 'px';

  // front image (always visible)
  var front = document.createElement('img');
  front.className = 'front';
  front.src = l.front;
  front.alt = 'lighter ' + (i + 1);
  div.appendChild(front);

  // photo cycle: [front] or [front, back]
  div._photos = [l.front];
  if (l.back) div._photos.push(l.back);
  div._photoIdx = 0;

  // click counter badge
  var badge = document.createElement('div');
  badge.className = 'lighter-count';
  badge.innerHTML = '<span>0</span>';
  div.appendChild(badge);

  grid.appendChild(div);
});

// ── INTERACTIONS ───────────────────────────────────────
var tooltip = document.getElementById('hover-label');

// tooltip follows mouse
document.addEventListener('mousemove', function(e) {
  tooltip.style.left = e.clientX + 'px';
  tooltip.style.top  = e.clientY + 'px';
});

document.querySelectorAll('.lighter').forEach(function(el) {

  // hover → show tooltip + instantly swap to back, restore on leave
  el.addEventListener('mouseenter', function() {
    tooltip.textContent = 'i have the same';
    tooltip.style.display = 'flex';
    if (el._photos.length >= 2) {
      el.querySelector('img.front').src = el._photos[1];
    }
  });

  el.addEventListener('mouseleave', function() {
    tooltip.style.display = 'none';
    el.querySelector('img.front').src = el._photos[0];
  });

  // left-click → increment counter, change tooltip at 10 consecutive clicks
  el.addEventListener('click', function() {
    var badge = el.querySelector('.lighter-count');
    var span  = badge.querySelector('span');
    var n = parseInt(span.textContent) + 1;
    span.textContent = n;
    badge.style.display = 'flex';
    el._clicks = (el._clicks || 0) + 1;
    if (el._clicks >= 10) {
      tooltip.textContent = "it's mine you thief";
    }
  });

});
